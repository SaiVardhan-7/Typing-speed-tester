<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TypingTester — Deep Space</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="stars-canvas"></canvas>

<input id="type-input" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" tabindex="0" />

<div id="app">
  <div id="title">⌨ Typing Tester</div>

  <div id="timer-picker">
    <span class="tp-label">Duration:</span>
    <button class="tp-btn" data-sec="15">15s</button>
    <button class="tp-btn active" data-sec="30">30s</button>
    <button class="tp-btn" data-sec="60">60s</button>
    <button class="tp-btn" data-sec="120">120s</button>
  </div>

  <div id="hud">
    <div class="hud-card">
      <div class="hud-label">WPM</div>
      <div class="hud-value" id="wpm-value">0</div>
    </div>
    <div class="hud-card">
      <div class="hud-label">Accuracy</div>
      <div class="hud-value" id="acc-value">100%</div>
    </div>
    <div class="hud-card">
      <div class="hud-label">Time</div>
      <div class="hud-value" id="timer-value">30</div>
    </div>
  </div>

  <div id="para-wrapper">
    <div id="para-display">
      <div id="para-scroll">
        <div id="para-text"></div>
      </div>
    </div>
  </div>

  <div id="progress-track">
    <div id="progress-fill"></div>
  </div>

  <div id="focus-prompt">🖱 Click anywhere and start typing…</div>
</div>

<div id="report-overlay">
  <div id="report-card">
    <h2>🛸 Mission Report</h2>
    <div class="sub" id="report-sub">30-second session complete</div>

    <div id="wpm-hero">
      <div class="wh-label">Words Per Minute</div>
      <div class="wh-number" id="final-wpm">—</div>
      <div class="wh-unit">WPM</div>
    </div>

    <div class="report-row">
      <span class="rl">Accuracy</span>
      <span class="rv" id="final-acc">—</span>
    </div>
    <div class="report-row">
      <span class="rl">Correct Chars</span>
      <span class="rv" id="final-chars">—</span>
    </div>
    <div class="report-row">
      <span class="rl">Paragraphs Done</span>
      <span class="rv" id="final-paras">—</span>
    </div>

    <div id="report-grade"></div>
    <button id="retry-btn">🔁 Retry Mission</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
