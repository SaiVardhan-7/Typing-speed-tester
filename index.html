<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TypingTester — Deep Space</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #050a14;
      --surface:   #0d1a2d;
      --surface2:  #0f2040;
      --neon-cyan: #00e5ff;
      --neon-blue: #2979ff;
      --neon-pink: #f000ff;
      --correct:   #00ffc8;
      --wrong:     #ff3d71;
      --text:      #cde0ff;
      --muted:     #4a6488;
      --glow-c:    0 0 8px #00e5ffaa, 0 0 20px #00e5ff44;
      --radius:    16px;
      --font:      'Courier New', 'Consolas', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      overflow: hidden;
      user-select: none;
    }

    #stars-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    #app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      gap: 22px;
    }

    #title {
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-weight: 900;
      background: linear-gradient(90deg, var(--neon-cyan), var(--neon-blue), var(--neon-pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 12px #00e5ff88);
      animation: titlePulse 4s ease-in-out infinite;
    }

    @keyframes titlePulse {
      0%, 100% { filter: drop-shadow(0 0 12px #00e5ff88); }
      50%       { filter: drop-shadow(0 0 24px #f000ff88); }
    }

    #hud {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .hud-card {
      background: var(--surface);
      border: 1px solid #1a3a5c;
      border-radius: var(--radius);
      padding: 10px 26px;
      text-align: center;
      min-width: 106px;
      position: relative;
      overflow: hidden;
      transition: border-color .3s;
    }

    .hud-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #00e5ff08, #f000ff08);
      pointer-events: none;
    }

    .hud-card:hover { border-color: var(--neon-cyan); }

    .hud-label {
      font-size: .6rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .hud-value {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--neon-cyan);
      text-shadow: var(--glow-c);
    }

    #timer-value.warning {
      color: #ffab00;
      text-shadow: 0 0 8px #ffab00aa;
      animation: blinkWarn .5s ease-in-out infinite alternate;
    }

    #timer-value.danger {
      color: var(--wrong);
      text-shadow: 0 0 10px #ff3d71aa;
      animation: blinkWarn .25s ease-in-out infinite alternate;
    }

    @keyframes blinkWarn {
      from { opacity: 1; }
      to   { opacity: .5; }
    }

    #para-wrapper {
      animation: antigravity 3.4s ease-in-out infinite;
      will-change: transform;
      width: min(94vw, 760px);
    }

    @keyframes antigravity {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-14px); }
    }

    #para-display {
      background: var(--surface);
      border: 1.5px solid #1a3a5c;
      border-radius: var(--radius);
      padding: 30px 36px;
      position: relative;
      overflow: hidden;
      box-shadow:
        0 0 40px #00e5ff10,
        0 24px 60px #00000088,
        inset 0 1px 0 #ffffff0a;
      min-height: 160px;
      display: flex;
      align-items: center;
    }

    /* scan line accent */
    #para-display::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
      animation: scanLine 3s linear infinite;
    }

    @keyframes scanLine {
      0%   { opacity: 0; transform: scaleX(0); }
      50%  { opacity: 1; transform: scaleX(1); }
      100% { opacity: 0; transform: scaleX(0); }
    }

    #para-display::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to bottom, var(--surface) 0%, transparent 18%, transparent 82%, var(--surface) 100%);
      pointer-events: none;
      z-index: 2;
    }

    #para-scroll {
      width: 100%;
      overflow: hidden;
      position: relative;
      height: calc(1.8em * 5 + 4px);
    }

    #para-text {
      font-size: clamp(1.1rem, 2.4vw, 1.35rem);
      line-height: 1.8em;
      letter-spacing: .04em;
      word-break: normal;      
      word-wrap: normal;
      white-space: normal;
      position: relative;
      transition: transform .32s cubic-bezier(.4,0,.2,1);
    }

    #para-text .word {
      display: inline-block;
    }

    #para-text .word-space {
      display: inline;
      letter-spacing: 0;
    }

    #para-text.float-away {
      animation: floatAway .5s cubic-bezier(.2, .8, .4, 1) forwards;
    }

    @keyframes floatAway {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-60px) scale(1.06); }
    }

    #para-text .ch {
      display: inline;
      color: var(--muted);
      transition: color .07s, text-shadow .07s;
      position: relative;
    }

    #para-text .ch.correct {
      color: var(--correct);
      text-shadow: 0 0 6px #00ffc877;
    }

    #para-text .ch.wrong {
      color: var(--wrong);
      text-shadow: 0 0 6px #ff3d7177;
    }

    #para-text .ch.cursor {
      border-bottom: 2.5px solid var(--neon-cyan);
      box-shadow: 0 3px 8px #00e5ff88;
      animation: cursorBlink .75s step-end infinite;
      /* keep space visible */
      min-width: .46em;
    }

    #para-text .ch.cursor.wrong {
      border-bottom-color: var(--wrong);
      box-shadow: 0 3px 8px #ff3d7188;
      animation: none;
    }

    @keyframes cursorBlink {
      0%, 100% { border-bottom-color: var(--neon-cyan); }
      50%       { border-bottom-color: transparent; }
    }

    #progress-track {
      width: min(94vw, 760px);
      height: 4px;
      background: #1a3a5c;
      border-radius: 999px;
      overflow: hidden;
    }

    #progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--neon-blue), var(--neon-cyan));
      border-radius: 999px;
      width: 0%;
      transition: width .2s linear;
      box-shadow: 0 0 8px #00e5ff88;
    }

    #type-input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
      width: 1px;
      height: 1px;
    }

    #focus-prompt {
      font-size: .72rem;
      letter-spacing: .15em;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: -6px;
      transition: opacity .3s;
    }

    #focus-prompt.hidden { opacity: 0; pointer-events: none; }

    #report-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: #050a14ee;
      backdrop-filter: blur(6px);
      align-items: center;
      justify-content: center;
    }

    #report-overlay.show { display: flex; }

    #report-card {
      background: var(--surface);
      border: 1.5px solid #1a3a5c;
      border-radius: 24px;
      padding: 44px 56px;
      text-align: center;
      max-width: min(92vw, 460px);
      box-shadow:
        0 0 60px #00e5ff18,
        0 40px 80px #00000099;
      animation: reportIn .6s cubic-bezier(.2,.9,.4,1) both;
    }

    @keyframes reportIn {
      from { opacity: 0; transform: scale(.8) translateY(40px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    #report-card h2 {
      font-size: 1.1rem;
      letter-spacing: .22em;
      text-transform: uppercase;
      margin-bottom: 4px;
      background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #report-card .sub {
      font-size: .65rem;
      color: var(--muted);
      letter-spacing: .16em;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    #wpm-hero {
      margin: 0 0 22px;
      padding: 18px 0 16px;
      border-top: 1px solid #1a3a5c;
      border-bottom: 1px solid #1a3a5c;
    }

    #wpm-hero .wh-label {
      font-size: .62rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    #wpm-hero .wh-number {
      font-size: 5rem;
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, var(--neon-cyan), var(--neon-blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 16px #00e5ff88);
    }

    #wpm-hero .wh-unit {
      font-size: .75rem;
      letter-spacing: .18em;
      color: var(--neon-cyan);
      text-transform: uppercase;
      margin-top: 2px;
    }

    .report-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #1a3a5c;
    }

    .report-row:last-of-type { border-bottom: none; }

    .report-row .rl { font-size: .68rem; letter-spacing: .13em; color: var(--muted); text-transform: uppercase; }
    .report-row .rv {
      font-size: 1.55rem;
      font-weight: 700;
      color: var(--neon-cyan);
      text-shadow: var(--glow-c);
    }

    #report-grade {
      margin: 18px 0 24px;
      font-size: 2.6rem;
      font-weight: 900;
    }

    #retry-btn {
      background: linear-gradient(135deg, var(--neon-blue), var(--neon-cyan));
      border: none;
      border-radius: 10px;
      padding: 13px 36px;
      font-size: 1rem;
      font-family: var(--font);
      font-weight: 700;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: #000;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
      box-shadow: 0 0 20px #00e5ff55;
    }

    #retry-btn:hover {
      transform: scale(1.06);
      box-shadow: 0 0 32px #00e5ff88;
    }

    #timer-picker {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    #timer-picker .tp-label {
      font-size: .62rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-right: 4px;
    }

    #timer-picker button {
      background: var(--surface2);
      border: 1.5px solid #1a3a5c;
      border-radius: 8px;
      padding: 6px 18px;
      font-size: .82rem;
      font-family: var(--font);
      font-weight: 700;
      letter-spacing: .1em;
      color: var(--muted);
      cursor: pointer;
      transition: background .18s, border-color .18s, color .18s, box-shadow .18s;
    }

    #timer-picker button:hover:not(:disabled) {
      border-color: var(--neon-cyan);
      color: var(--neon-cyan);
      box-shadow: 0 0 10px #00e5ff33;
    }

    #timer-picker button.active {
      background: linear-gradient(135deg, #0d3060, #092540);
      border-color: var(--neon-cyan);
      color: var(--neon-cyan);
      box-shadow: 0 0 14px #00e5ff44;
    }

    #timer-picker button:disabled {
      opacity: .35;
      cursor: not-allowed;
    }

    @media (max-width: 520px) {
      #para-display { padding: 22px 18px; }
      #report-card  { padding: 28px 20px; }
    }
  </style>
</head>
<body>

<canvas id="stars-canvas"></canvas>

<input id="type-input" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" tabindex="0" />

<div id="app">
  <div id="title">⌨ Typing Tester</div>

  <div id="timer-picker">
    <span class="tp-label">Duration:</span>
    <button class="tp-btn" data-sec="15">15s</button>
    <button class="tp-btn active" data-sec="30">30s</button>
    <button class="tp-btn" data-sec="60">60s</button>
    <button class="tp-btn" data-sec="120">120s</button>
  </div>

  <div id="hud">
    <div class="hud-card">
      <div class="hud-label">WPM</div>
      <div class="hud-value" id="wpm-value">0</div>
    </div>
    <div class="hud-card">
      <div class="hud-label">Accuracy</div>
      <div class="hud-value" id="acc-value">100%</div>
    </div>
    <div class="hud-card">
      <div class="hud-label">Time</div>
      <div class="hud-value" id="timer-value">30</div>
    </div>
  </div>

  <div id="para-wrapper">
    <div id="para-display">
      <div id="para-scroll">
        <div id="para-text"></div>
      </div>
    </div>
  </div>

  <div id="progress-track">
    <div id="progress-fill"></div>
  </div>

  <div id="focus-prompt">🖱 Click anywhere and start typing…</div>
</div>

<div id="report-overlay">
  <div id="report-card">
    <h2>🛸 Mission Report</h2>
    <div class="sub" id="report-sub">30-second session complete</div>

    <div id="wpm-hero">
      <div class="wh-label">Words Per Minute</div>
      <div class="wh-number" id="final-wpm">—</div>
      <div class="wh-unit">WPM</div>
    </div>

    <div class="report-row">
      <span class="rl">Accuracy</span>
      <span class="rv" id="final-acc">—</span>
    </div>
    <div class="report-row">
      <span class="rl">Correct Chars</span>
      <span class="rv" id="final-chars">—</span>
    </div>
    <div class="report-row">
      <span class="rl">Paragraphs Done</span>
      <span class="rv" id="final-paras">—</span>
    </div>

    <div id="report-grade"></div>
    <button id="retry-btn" onclick="initGame()">🔁 Retry Mission</button>
  </div>
</div>

<script>

(function () {
  const canvas = document.getElementById('stars-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, stars = [];
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  function createStars(n) {
    stars = [];
    for (let i = 0; i < n; i++) {
      stars.push({
        x: Math.random() * W, y: Math.random() * H,
        r: Math.random() * 1.4 + 0.2, a: Math.random(),
        da: (Math.random() * 0.004 + 0.001) * (Math.random() < 0.5 ? 1 : -1),
        col: Math.random() < 0.15 ? '#00e5ff' : Math.random() < 0.1 ? '#a78bfa' : '#fff'
      });
    }
  }
  function draw() {
    ctx.clearRect(0, 0, W, H);
    stars.forEach(s => {
      s.a += s.da;
      if (s.a <= 0 || s.a >= 1) s.da *= -1;
      ctx.globalAlpha = Math.max(0, Math.min(1, s.a));
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = s.col; ctx.fill();
    });
    ctx.globalAlpha = 1;
    requestAnimationFrame(draw);
  }
  window.addEventListener('resize', () => { resize(); createStars(220); });
  resize(); createStars(220); draw();
})();

const WORD_BANK = [
  'the','a','an','this','that','these','those','every','each','some','any','all','no',
  'i','you','he','she','it','we','they','me','him','her','us','them','my','your','his',
  'its','our','their','who','which','what',
  'is','are','was','were','be','been','have','has','had','do','does','did','will','would',
  'can','could','should','may','might','must','go','come','get','make','know','think',
  'take','see','look','want','give','use','find','tell','ask','seem','feel','try','leave',
  'call','keep','let','begin','show','hear','play','run','move','live','happen','write',
  'become','bring','hold','turn','start','follow','create','remember','believe','allow',
  'without','need','help','build','change','fall','follow','move',
  'time','year','people','way','day','man','woman','child','world','life','hand','part',
  'place','case','week','company','system','program','question','number','night','point',
  'city','home','word','fact','work','city','story','idea','body','information','back',
  'space','light','voice','power','country','water','room','book','eye','job','word',
  'line','group','problem','city','play','small','end',
  'good','new','first','last','long','great','own','other','old','right','big','high',
  'different','small','large','next','early','young','important','few','public','old',
  'real','best','free','fresh','dark','clear','full','open','hard','strong','true','same',
  'able','deep','sure','far','soon','still','just','often','here','also','now','then',
  'always','never','together','already','once','quite','quickly','easily','slowly',
  'usually','really','perhaps','simply','enough','however','around','below','above',
  'of','in','to','for','on','with','at','by','from','up','about','into','through',
  'during','before','after','between','out','against','without','under','along','and',
  'but','or','if','so','because','while','although','when','where','since','until','as'
];

function generateParagraph() {
  const TARGET = 60;   
  const bank = [...WORD_BANK];
  for (let i = bank.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [bank[i], bank[j]] = [bank[j], bank[i]];
  }
  const words = [];
  for (let i = 0; i < TARGET; i++) {
    words.push(bank[i % bank.length]);
  }
  let result = '';
  let i = 0;
  while (i < words.length) {
    const chunkLen = 8 + Math.floor(Math.random() * 5); 
    const chunk = words.slice(i, i + chunkLen);
    if (i === 0) chunk[0] = chunk[0].charAt(0).toUpperCase() + chunk[0].slice(1);
    result += chunk.join(' ');
    i += chunkLen;
    if (i < words.length) result += ', ';  
  }
  result = result.replace(/,?\s*$/, '') + '.';
  return result;
}

let selectedDuration = 30;   
let currentPara     = '';
let charIndex       = 0;  
let timerInterval   = null;
let timeLeft        = selectedDuration;
let started         = false;
let gameOver        = false;
let totalKeystrokes   = 0;
let correctKeystrokes = 0;
let parasDone         = 0;

const paraText      = document.getElementById('para-text');
const typeInput     = document.getElementById('type-input');
const wpmEl         = document.getElementById('wpm-value');
const accEl         = document.getElementById('acc-value');
const timerEl       = document.getElementById('timer-value');
const progressFill  = document.getElementById('progress-fill');
const focusPrompt   = document.getElementById('focus-prompt');
const reportOverlay = document.getElementById('report-overlay');
const reportSub     = document.getElementById('report-sub');
const pickerBtns    = document.querySelectorAll('.tp-btn');

pickerBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    if (started && !gameOver) return;    
    selectedDuration = parseInt(btn.dataset.sec, 10);
    pickerBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    timerEl.textContent = selectedDuration;
    timerEl.className   = '';
  });
});

function lockPicker(lock) {
  pickerBtns.forEach(b => { b.disabled = lock; });
}

function initGame() {
  timeLeft          = selectedDuration;
  started           = false;
  gameOver          = false;
  totalKeystrokes   = 0;
  correctKeystrokes = 0;
  parasDone         = 0;
  charIndex         = 0;

  clearInterval(timerInterval);
  timerEl.textContent = selectedDuration;
  timerEl.className   = '';
  wpmEl.textContent   = '0';
  accEl.textContent   = '100%';
  progressFill.style.width = '0%';

  typeInput.value = '';
  typeInput.disabled = false;

  lockPicker(false);  
  reportOverlay.classList.remove('show');
  focusPrompt.classList.remove('hidden');

  loadParagraph(false);
  typeInput.focus();
}

function shuffled(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function loadParagraph(withAnimation) {
  currentPara = generateParagraph();
  charIndex   = 0;

  if (withAnimation) {
    paraText.classList.add('float-away');
    setTimeout(() => {
      paraText.classList.remove('float-away');
      renderParagraph();
    }, 520);
  } else {
    renderParagraph();
  }
}
let allSpans = [];

function renderParagraph() {
  paraText.innerHTML = '';
  paraText.style.transform = 'translateY(0)';
  allSpans = [];
  const tokens = currentPara.split(/(\s)/);   
  tokens.forEach(token => {
    if (token === '') return;
    if (token === ' ') {
      const sp = document.createElement('span');
      sp.classList.add('ch', 'word-space');
      sp.textContent = '\u00a0';           
      sp.dataset.char = ' ';
      paraText.appendChild(sp);
      allSpans.push(sp);
    } else {
      const wordEl = document.createElement('span');
      wordEl.classList.add('word');

      for (const char of token) {
        const span = document.createElement('span');
        span.classList.add('ch');
        span.textContent = char;
        span.dataset.char = char;
        wordEl.appendChild(span);
        allSpans.push(span);
      }
      paraText.appendChild(wordEl);
    }
  });
  if (allSpans[charIndex]) allSpans[charIndex].classList.add('cursor');
}

function updateProgress() {
  const pct = currentPara.length > 0 ? (charIndex / currentPara.length) * 100 : 0;
  progressFill.style.width = pct + '%';
  scrollToCursor();
}

function scrollToCursor() {
  if (!allSpans[charIndex]) return;
  const cursorSpan  = allSpans[charIndex];
  const containerH  = document.getElementById('para-scroll').clientHeight;
  const lineH       = parseFloat(getComputedStyle(paraText).lineHeight) || 28;
  const cursorTop   = cursorSpan.offsetTop;
  const desiredScroll = cursorTop - (containerH / 2) + (lineH / 2);
  const clamped = Math.max(0, desiredScroll);
  paraText.style.transform = `translateY(${-clamped}px)`;
}

function startTimer() {
  lockPicker(true);  
  timerInterval = setInterval(() => {
    timeLeft--;
    timerEl.textContent = timeLeft;
    const elapsed = selectedDuration - timeLeft;
    if (elapsed > 0) {
      const liveWPM = Math.round((correctKeystrokes / 5) / (elapsed / 60));
      wpmEl.textContent = liveWPM;
    }

    if      (timeLeft <= 5)  timerEl.className = 'danger';
    else if (timeLeft <= 10) timerEl.className = 'warning';

    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      endGame();
    }
  }, 1000);
}

function endGame() {
  gameOver = true;
  typeInput.disabled = true;

  const wpm = Math.round((correctKeystrokes / 5) / (selectedDuration / 60));
  const acc = totalKeystrokes === 0
    ? 100
    : Math.round((correctKeystrokes / totalKeystrokes) * 100);

  let grade, emoji;
  if      (wpm >= 80 && acc >= 95) { grade = 'S'; emoji = '🌟'; }
  else if (wpm >= 60 && acc >= 90) { grade = 'A'; emoji = '🚀'; }
  else if (wpm >= 40 && acc >= 80) { grade = 'B'; emoji = '🛸'; }
  else if (wpm >= 25 && acc >= 70) { grade = 'C'; emoji = '🌙'; }
  else                              { grade = 'D'; emoji = '🪐'; }

  document.getElementById('final-wpm').textContent   = wpm;
  document.getElementById('final-acc').textContent   = acc + '%';
  document.getElementById('final-chars').textContent = correctKeystrokes;
  document.getElementById('final-paras').textContent = parasDone;
  document.getElementById('report-grade').textContent = `${emoji} Grade: ${grade}`;
  reportSub.textContent = `${selectedDuration}-second session complete`;

  reportOverlay.classList.add('show');
}

document.addEventListener('keydown', handleKey);

function handleKey(e) {
  if (gameOver) return;
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  if (e.key.length !== 1 && e.key !== 'Backspace') return;
  if (!started) {
    started = true;
    focusPrompt.classList.add('hidden');
    startTimer();
  }

  if (e.key === 'Backspace') {
    e.preventDefault();
    if (charIndex > 0) {
      charIndex--;
      allSpans[charIndex].classList.remove('correct', 'wrong', 'cursor');
      allSpans[charIndex].classList.add('cursor');
      if (allSpans[charIndex + 1]) allSpans[charIndex + 1].classList.remove('cursor');
      updateProgress();
    }
    return;
  }
  const expected = currentPara[charIndex];
  const typed    = e.key;
  totalKeystrokes++;
  const span = allSpans[charIndex];
  span.classList.remove('cursor');
  if (typed === expected) {
    span.classList.add('correct');
    correctKeystrokes++;
  } else {
    span.classList.add('wrong');
  }

  charIndex++;

  if (charIndex < currentPara.length) {
    allSpans[charIndex].classList.add('cursor');
    updateProgress();
  } else {
    parasDone++;
    updateProgress();
    const acc = Math.round((correctKeystrokes / totalKeystrokes) * 100);
    accEl.textContent = acc + '%';
    loadParagraph(true);
    return;
  }
  const acc = Math.round((correctKeystrokes / totalKeystrokes) * 100);
  accEl.textContent = acc + '%';
}
document.addEventListener('click', () => {
  if (!gameOver) typeInput.focus();
});
initGame();

</script>
